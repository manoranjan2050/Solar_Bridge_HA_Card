<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Solar Bridge Generator</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #0d1117;
        --panel: #141b23;
        --panel-strong: #19232d;
        --line: rgba(255, 255, 255, 0.1);
        --text: #f5f9fc;
        --muted: #9caebc;
        --solar: #ffe66d;
        --green: #35d07f;
        --blue: #48b6ff;
        --danger: #ff7b72;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background:
          radial-gradient(circle at 18% 12%, rgba(255, 230, 109, 0.13), transparent 28%),
          radial-gradient(circle at 86% 8%, rgba(72, 182, 255, 0.16), transparent 30%),
          linear-gradient(145deg, #0d1117 0%, #111922 48%, #090d12 100%);
      }

      button,
      input,
      select {
        font: inherit;
      }

      .app {
        width: min(1180px, calc(100% - 32px));
        margin: 0 auto;
        padding: 36px 0;
      }

      .topbar {
        display: flex;
        align-items: end;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 24px;
      }

      .eyebrow {
        margin: 0 0 8px;
        color: var(--solar);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0;
        text-transform: uppercase;
      }

      h1 {
        margin: 0;
        font-size: clamp(30px, 5vw, 56px);
        line-height: 1;
        letter-spacing: 0;
      }

      .summary {
        max-width: 480px;
        margin: 10px 0 0;
        color: var(--muted);
        font-size: 16px;
        line-height: 1.55;
      }

      .status {
        min-width: 116px;
        padding: 10px 13px;
        color: #07110d;
        font-size: 13px;
        font-weight: 800;
        text-align: center;
        background: linear-gradient(135deg, var(--solar), var(--green));
        border-radius: 999px;
      }

      .workspace {
        display: grid;
        grid-template-columns: minmax(300px, 0.85fr) minmax(360px, 1.15fr);
        gap: 18px;
        align-items: start;
      }

      .panel {
        background: rgba(20, 27, 35, 0.86);
        border: 1px solid var(--line);
        border-radius: 16px;
        box-shadow: 0 20px 48px rgba(0, 0, 0, 0.28);
        backdrop-filter: blur(16px);
      }

      .form-panel {
        padding: 18px;
      }

      .panel-title {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 16px;
      }

      h2 {
        margin: 0;
        font-size: 18px;
        line-height: 1.25;
        letter-spacing: 0;
      }

      .pill {
        padding: 6px 9px;
        color: var(--muted);
        font-size: 12px;
        font-weight: 750;
        background: rgba(255, 255, 255, 0.06);
        border: 1px solid var(--line);
        border-radius: 999px;
      }

      .field {
        display: grid;
        gap: 7px;
        margin-bottom: 14px;
      }

      label {
        color: #d7e3ec;
        font-size: 13px;
        font-weight: 750;
      }

      input,
      select {
        width: 100%;
        height: 45px;
        padding: 0 13px;
        color: var(--text);
        background: #0f151c;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 10px;
        outline: none;
      }

      select {
        appearance: none;
        background-image:
          linear-gradient(45deg, transparent 50%, #9caebc 50%),
          linear-gradient(135deg, #9caebc 50%, transparent 50%);
        background-position:
          calc(100% - 18px) 19px,
          calc(100% - 12px) 19px;
        background-size:
          6px 6px,
          6px 6px;
        background-repeat: no-repeat;
      }

      input:focus,
      select:focus {
        border-color: rgba(72, 182, 255, 0.78);
        box-shadow: 0 0 0 3px rgba(72, 182, 255, 0.16);
      }

      .actions {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 10px;
        margin-top: 18px;
      }

      .copy-button,
      .reset-button {
        height: 44px;
        border: 0;
        border-radius: 10px;
        cursor: pointer;
      }

      .copy-button {
        color: #06100b;
        font-weight: 850;
        background: linear-gradient(135deg, var(--solar), var(--green));
      }

      .reset-button {
        padding: 0 14px;
        color: var(--text);
        font-weight: 750;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid var(--line);
      }

      .copy-button:active,
      .reset-button:active {
        transform: translateY(1px);
      }

      .preview-panel {
        overflow: hidden;
      }

      .preview-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 16px 18px;
        background: rgba(255, 255, 255, 0.035);
        border-bottom: 1px solid var(--line);
      }

      .preview-grid {
        display: grid;
        grid-template-columns: minmax(260px, 0.9fr) minmax(280px, 1.1fr);
        gap: 0;
      }

      .card-preview {
        padding: 18px;
        border-right: 1px solid var(--line);
      }

      .solar-card {
        overflow: hidden;
        min-height: 350px;
        padding: 18px;
        background:
          radial-gradient(circle at 22% 15%, rgba(255, 230, 109, 0.14), transparent 28%),
          radial-gradient(circle at 80% 16%, rgba(72, 182, 255, 0.14), transparent 30%),
          linear-gradient(145deg, #101820 0%, #16202a 48%, #0d1117 100%);
        border: 1px solid rgba(255, 255, 255, 0.09);
        border-radius: 16px;
      }

      .solar-card.dashboard {
        min-height: 350px;
      }

      .solar-card.compact {
        min-height: 250px;
        padding: 14px;
      }

      .solar-card header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
      }

      .solar-card h3 {
        margin: 0;
        font-size: 22px;
        line-height: 1.15;
      }

      .today {
        min-width: 96px;
        padding: 9px 11px;
        text-align: right;
        background: rgba(255, 255, 255, 0.07);
        border: 1px solid rgba(255, 255, 255, 0.09);
        border-radius: 12px;
      }

      .today span {
        display: block;
        color: var(--muted);
        font-size: 11px;
        font-weight: 750;
      }

      .today strong {
        display: block;
        margin-top: 2px;
        color: var(--solar);
        font-size: 15px;
      }

      svg {
        display: block;
        width: 100%;
        min-height: 190px;
      }

      .solar-card.dashboard svg {
        min-height: 150px;
      }

      .solar-card.compact svg {
        min-height: 120px;
      }

      .wire {
        fill: none;
        stroke: url(#flowGradient);
        stroke-width: 8;
        stroke-linecap: round;
        stroke-dasharray: 14 13;
        animation: flow 1.15s linear infinite;
      }

      .wire.back {
        animation-direction: reverse;
      }

      .node-shape {
        fill: rgba(255, 255, 255, 0.08);
        stroke: rgba(255, 255, 255, 0.18);
        stroke-width: 2;
      }

      .node-line {
        fill: none;
        stroke: #e8f5ff;
        stroke-width: 5;
        stroke-linecap: round;
        stroke-linejoin: round;
      }

      .node-text {
        fill: #c9d7e2;
        font-size: 14px;
        font-weight: 700;
        text-anchor: middle;
      }

      .mini-metrics {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin-top: 8px;
      }

      .solar-card.dashboard .mini-metrics {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }

      .solar-card.compact .mini-metrics {
        grid-template-columns: repeat(5, minmax(0, 1fr));
      }

      .mini-metric {
        min-width: 0;
        padding: 10px;
        background: rgba(255, 255, 255, 0.065);
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
      }

      .mini-metric span {
        display: block;
        overflow: hidden;
        color: var(--muted);
        font-size: 11px;
        font-weight: 750;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .mini-metric strong {
        display: block;
        overflow: hidden;
        margin-top: 4px;
        color: var(--text);
        font-size: 13px;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .solar-card.compact .mini-metric {
        padding: 8px;
      }

      .solar-card.compact .mini-metric span {
        font-size: 10px;
      }

      .solar-card.compact .mini-metric strong {
        font-size: 11px;
      }

      .yaml-wrap {
        min-width: 0;
        padding: 18px;
      }

      pre {
        min-height: 350px;
        margin: 0;
        padding: 16px;
        overflow: auto;
        color: #e8f5ff;
        font-size: 13px;
        line-height: 1.55;
        background: #0a0f14;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 12px;
      }

      code {
        font-family: "Cascadia Code", "Fira Code", Consolas, monospace;
      }

      .toast {
        position: fixed;
        right: 18px;
        bottom: 18px;
        padding: 11px 14px;
        color: #06100b;
        font-size: 13px;
        font-weight: 850;
        background: linear-gradient(135deg, var(--solar), var(--green));
        border-radius: 999px;
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.28);
        opacity: 0;
        transform: translateY(10px);
        transition:
          opacity 0.2s ease,
          transform 0.2s ease;
        pointer-events: none;
      }

      .toast.visible {
        opacity: 1;
        transform: translateY(0);
      }

      @keyframes flow {
        to {
          stroke-dashoffset: -54;
        }
      }

      @media (max-width: 920px) {
        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .workspace,
        .preview-grid {
          grid-template-columns: 1fr;
        }

        .card-preview {
          border-right: 0;
          border-bottom: 1px solid var(--line);
        }
      }

      @media (max-width: 520px) {
        .app {
          width: min(100% - 20px, 1180px);
          padding: 20px 0;
        }

        .form-panel,
        .card-preview,
        .yaml-wrap {
          padding: 14px;
        }

        .actions {
          grid-template-columns: 1fr;
        }

        .reset-button {
          width: 100%;
        }

        .solar-card header {
          align-items: flex-start;
          flex-direction: column;
        }

        .today {
          width: 100%;
          text-align: left;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section class="topbar">
        <div>
          <p class="eyebrow">Home Assistant YAML Tool</p>
          <h1>Solar Bridge Generator</h1>
          <p class="summary">
            Enter your entity IDs and generate ready-to-paste YAML for the Solar Bridge custom card.
          </p>
        </div>
        <div class="status" id="status">Live Preview</div>
      </section>

      <section class="workspace">
        <form class="panel form-panel" id="generatorForm">
          <div class="panel-title">
            <h2>Card Inputs</h2>
            <span class="pill">No backend</span>
          </div>

          <div class="field">
            <label for="cardStyle">Card Style</label>
            <select id="cardStyle" name="card_style">
              <option value="power-flow">Power Flow</option>
              <option value="dashboard">Dashboard</option>
              <option value="compact">Compact</option>
            </select>
          </div>

          <div class="field">
            <label for="solar">Solar Power Entity</label>
            <input id="solar" name="solar_power_entity" value="sensor.solar_power" autocomplete="off" />
          </div>

          <div class="field">
            <label for="batterySoc">Battery SOC Entity</label>
            <input id="batterySoc" name="battery_soc_entity" value="sensor.battery_soc" autocomplete="off" />
          </div>

          <div class="field">
            <label for="batteryPower">Battery Power Entity</label>
            <input id="batteryPower" name="battery_power_entity" value="sensor.battery_power" autocomplete="off" />
          </div>

          <div class="field">
            <label for="load">Load Power Entity</label>
            <input id="load" name="load_power_entity" value="sensor.load_power" autocomplete="off" />
          </div>

          <div class="field">
            <label for="grid">Grid Power Entity</label>
            <input id="grid" name="grid_power_entity" value="sensor.grid_power" autocomplete="off" />
          </div>

          <div class="actions">
            <button class="copy-button" id="copyButton" type="button">Copy YAML</button>
            <button class="reset-button" id="resetButton" type="button">Reset</button>
          </div>
        </form>

        <section class="panel preview-panel">
          <div class="preview-head">
            <h2>Live Preview</h2>
            <span class="pill">custom:solar-bridge-card</span>
          </div>

          <div class="preview-grid">
            <div class="card-preview">
              <article class="solar-card" id="cardPreview">
                <header>
                  <div>
                    <p class="eyebrow">Energy Flow</p>
                    <h3>Solar Bridge</h3>
                  </div>
                  <div class="today">
                    <span>Today</span>
                    <strong>12.8 kWh</strong>
                  </div>
                </header>

                <svg viewBox="0 0 420 250" role="img" aria-label="Solar Bridge card preview">
                  <defs>
                    <linearGradient id="flowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                      <stop offset="0%" stop-color="#ffe66d" />
                      <stop offset="45%" stop-color="#35d07f" />
                      <stop offset="100%" stop-color="#48b6ff" />
                    </linearGradient>
                  </defs>

                  <path class="wire" d="M112 62 C165 62 169 116 210 116" />
                  <path class="wire" d="M210 116 C255 116 263 62 313 62" />
                  <path class="wire back" d="M210 126 C210 163 163 178 143 198" />
                  <path class="wire" d="M210 126 C210 163 259 178 280 198" />

                  <circle class="node-shape" cx="84" cy="62" r="37" />
                  <path class="node-line" d="M84 42 v40 M64 62 h40 M70 48 l28 28 M98 48 70 76" />
                  <text class="node-text" x="84" y="117">Solar</text>

                  <circle class="node-shape" cx="210" cy="122" r="43" />
                  <path class="node-line" d="M190 121 h40 M210 101 v40 M195 107 h30 M195 135 h30" />
                  <text class="node-text" x="210" y="181">Bridge</text>

                  <circle class="node-shape" cx="336" cy="62" r="37" />
                  <path class="node-line" d="M318 65 h36 M323 79 h26 M328 48 h16 l5 17 h-26z" />
                  <text class="node-text" x="336" y="117">Load</text>

                  <rect class="node-shape" x="96" y="179" width="76" height="43" rx="12" />
                  <rect class="node-shape" x="172" y="193" width="8" height="15" rx="3" />
                  <rect x="102" y="185" width="48" height="31" rx="8" fill="#35d07f" />
                  <text class="node-text" x="134" y="245">Battery 75%</text>

                  <rect class="node-shape" x="250" y="178" width="72" height="48" rx="12" />
                  <path class="node-line" d="M262 212 h48 M268 200 h36 M274 188 h24" />
                  <text class="node-text" x="286" y="245">Grid</text>
                </svg>

                <div class="mini-metrics" id="metricPreview"></div>
              </article>
            </div>

            <div class="yaml-wrap">
              <pre><code id="yamlOutput"></code></pre>
            </div>
          </div>
        </section>
      </section>
    </main>

    <div class="toast" id="toast">YAML copied</div>

    <script>
      const defaults = {
        card_style: "power-flow",
        solar_power_entity: "sensor.solar_power",
        battery_soc_entity: "sensor.battery_soc",
        battery_power_entity: "sensor.battery_power",
        load_power_entity: "sensor.load_power",
        grid_power_entity: "sensor.grid_power",
      };

      const form = document.querySelector("#generatorForm");
      const output = document.querySelector("#yamlOutput");
      const copyButton = document.querySelector("#copyButton");
      const resetButton = document.querySelector("#resetButton");
      const metricPreview = document.querySelector("#metricPreview");
      const cardPreview = document.querySelector("#cardPreview");
      const toast = document.querySelector("#toast");
      const status = document.querySelector("#status");

      const labels = {
        solar_power_entity: "Solar Power",
        battery_soc_entity: "Battery SOC",
        battery_power_entity: "Battery Power",
        load_power_entity: "Load Power",
        grid_power_entity: "Grid Power",
      };

      const styleLabels = {
        "power-flow": "Power Flow",
        dashboard: "Dashboard",
        compact: "Compact",
      };

      function clean(value) {
        return value.trim() || "sensor.example";
      }

      function getValues() {
        return Object.fromEntries(new FormData(form).entries());
      }

      function createYaml(values) {
        return [
          "type: custom:solar-bridge-card",
          "title: Solar Bridge",
          `card_style: ${values.card_style}`,
          `solar_power_entity: ${clean(values.solar_power_entity)}`,
          `battery_soc_entity: ${clean(values.battery_soc_entity)}`,
          `battery_power_entity: ${clean(values.battery_power_entity)}`,
          `load_power_entity: ${clean(values.load_power_entity)}`,
          `grid_power_entity: ${clean(values.grid_power_entity)}`,
        ].join("\n");
      }

      function renderMetrics(values) {
        metricPreview.innerHTML = Object.entries(labels)
          .map(
            ([key, label]) => `
              <div class="mini-metric">
                <span>${label}</span>
                <strong>${clean(values[key])}</strong>
              </div>
            `,
          )
          .join("");
      }

      function updatePreviewStyle(style) {
        cardPreview.className = `solar-card ${style}`;
        document.querySelector(".preview-head .pill").textContent = styleLabels[style] || "Power Flow";
      }

      function update() {
        const values = getValues();
        output.textContent = createYaml(values);
        renderMetrics(values);
        updatePreviewStyle(values.card_style);
        status.textContent = "Updated";
        window.clearTimeout(update.statusTimer);
        update.statusTimer = window.setTimeout(() => {
          status.textContent = "Live Preview";
        }, 900);
      }

      function showToast(message) {
        toast.textContent = message;
        toast.classList.add("visible");
        window.clearTimeout(showToast.timer);
        showToast.timer = window.setTimeout(() => toast.classList.remove("visible"), 1600);
      }

      async function copyYaml() {
        const yaml = output.textContent;

        try {
          await navigator.clipboard.writeText(yaml);
          showToast("YAML copied");
        } catch (error) {
          const selection = window.getSelection();
          const range = document.createRange();
          range.selectNodeContents(output);
          selection.removeAllRanges();
          selection.addRange(range);
          showToast("YAML selected");
        }
      }

      function resetForm() {
        Object.entries(defaults).forEach(([key, value]) => {
          form.elements[key].value = value;
        });
        update();
      }

      form.addEventListener("input", update);
      form.addEventListener("change", update);
      copyButton.addEventListener("click", copyYaml);
      resetButton.addEventListener("click", resetForm);

      update();
    </script>
  </body>
</html>
